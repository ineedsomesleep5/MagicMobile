services:
  web:
    image: node:22-alpine
    working_dir: /workspace
    command: sh -lc "corepack enable && pnpm install --frozen-lockfile && pnpm dev"
    environment:
      XMAGE_GATEWAY_URL: http://xmage-gateway:17171
      SCRYFALL_CACHE_DIR: /workspace/.cache/scryfall
    ports:
      - "3000:3000"
    volumes:
      - .:/workspace
      - node-modules:/workspace/node_modules
      - scryfall-cache:/workspace/.cache/scryfall
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      xmage-gateway:
        condition: service_started

  xmage-gateway:
    image: node:22-alpine
    working_dir: /workspace
    command: node apps/xmage-gateway/server.mjs
    environment:
      PORT: 17171
      SCRYFALL_CACHE_DIR: /workspace/.cache/scryfall
      XMAGE_AI_STALL_MS: 45000
    ports:
      - "17171:17171"
    volumes:
      - .:/workspace
      - scryfall-cache:/workspace/.cache/scryfall
      - xmage-assets:/workspace/.cache/xmage

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: magicmobile
      POSTGRES_USER: magicmobile
      POSTGRES_PASSWORD: magicmobile
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U magicmobile -d magicmobile"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  node-modules:
  postgres-data:
  scryfall-cache:
  xmage-assets:

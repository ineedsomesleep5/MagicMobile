services:
  web:
    image: node:22-bookworm-slim
    working_dir: /workspace
    command: sh -lc "corepack enable && pnpm install --frozen-lockfile --config.ignore-scripts=false && pnpm --filter @magicmobile/web build && pnpm --filter @magicmobile/web exec next start --hostname 0.0.0.0"
    environment:
      ENGINE_MODE: xmage
      XMAGE_GATEWAY_URL: http://xmage-gateway:17171
      SCRYFALL_CACHE_DIR: /workspace/.cache/scryfall
      PUBLIC_APP_URL: https://magicmobile.openclaw-is3w.srv1420950.hstgr.cloud
      NEXT_TELEMETRY_DISABLED: "1"
      NODE_ENV: production
    ports:
      - "3000:3000"
    volumes:
      - .:/workspace
      - node-modules:/workspace/node_modules
      - scryfall-cache:/workspace/.cache/scryfall
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      xmage-gateway:
        condition: service_started

  xmage-gateway:
    image: node:22-bookworm-slim
    working_dir: /workspace
    command: sh -lc "corepack enable && pnpm install --frozen-lockfile --config.ignore-scripts=false && node apps/xmage-gateway/server.mjs"
    environment:
      PORT: 17171
      SCRYFALL_CACHE_DIR: /workspace/.cache/scryfall
      XMAGE_AI_STALL_MS: 45000
      XMAGE_BRIDGE_URL: http://xmage-bridge:17172
    ports:
      - "17171:17171"
    volumes:
      - .:/workspace
      - node-modules:/workspace/node_modules
      - scryfall-cache:/workspace/.cache/scryfall
      - xmage-assets:/workspace/.cache/xmage
    depends_on:
      xmage-bridge:
        condition: service_started

  xmage-bridge:
    build:
      context: ./apps/xmage-gateway/bridge
    environment:
      XMAGE_SERVER_XMX: 1024m
      BRIDGE_PORT: 17172
      XMAGE_HOST: 127.0.0.1
      XMAGE_PORT: 17171
      GATEWAY_URL: http://xmage-gateway:17171
    ports:
      - "17172:17172"
      - "17179:17179"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:17172/health | grep -q '\"status\":\"ready\"'"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 45s

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: magicmobile
      POSTGRES_USER: magicmobile
      POSTGRES_PASSWORD: magicmobile
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U magicmobile -d magicmobile"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  node-modules:
  postgres-data:
  scryfall-cache:
  xmage-assets:

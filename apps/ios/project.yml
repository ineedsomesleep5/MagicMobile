name: MagicMobileiOS
options:
  bundleIdPrefix: com.calebfeliciano
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    DEVELOPMENT_TEAM: 82HPAY85M8
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    SWIFT_VERSION: "5.9"
targets:
  MagicMobile:
    type: application
    platform: iOS
    sources:
      - path: MagicMobile
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.calebfeliciano.magicmobile
        PRODUCT_NAME: MagicMobile
        INFOPLIST_FILE: MagicMobile/Info.plist
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: NO
  MagicMobileTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: MagicMobileTests
    dependencies:
      - target: MagicMobile

